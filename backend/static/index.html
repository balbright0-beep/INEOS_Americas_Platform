<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>INEOS Americas Platform</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/ids.css">
<script>tailwind.config={theme:{extend:{colors:{ineos:{red:'#FF4639',onyx:'#1D1D1D',charcoal:'#171717',mushroom:'#D9D7D0','mushroom-light':'#FAFAF9',dove:'#E9E8E5','iron-smoke':'#606060','silver-dust':'#9F9F9F'}},fontFamily:{sans:["'Plus Jakarta Sans'",'Inter','system-ui','sans-serif'],body:['Inter','system-ui','sans-serif'],mono:["'JetBrains Mono'",'monospace']}}}}</script>
<style>
iframe{border:none;width:100%;height:100%}
body{font-family:var(--ids-font-body);background:var(--ids-surface-page);color:var(--ids-text-primary)}
</style>
</head>
<body class="font-sans"><div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

/* ===== API ===== */
const API={
  token:sessionStorage.getItem('pt'),
  async req(p,o={}){const h={'Content-Type':'application/json'};if(this.token)h['Authorization']='Bearer '+this.token;const r=await fetch(p,{...o,headers:h});if(r.status===401){this.logout();throw new Error('auth')}return r.json()},
  get(p){return this.req(p)},
  post(p,d){return this.req(p,{method:'POST',body:JSON.stringify(d)})},
  del(p){return this.req(p,{method:'DELETE'})},
  async uploadFile(p,file){const fd=new FormData();fd.append('file',file);const h={};if(this.token)h['Authorization']='Bearer '+this.token;const r=await fetch(p,{method:'POST',body:fd,headers:h});return r.json()},
  setToken(t){this.token=t;sessionStorage.setItem('pt',t)},
  logout(){this.token=null;sessionStorage.removeItem('pt');sessionStorage.removeItem('pu');location.reload()},
};

const DASH_URL='/dashboard';
const ALLOC_URL='https://ineos-allocation-app.onrender.com';
const INCENT_URL='https://ineos-incentive-app.onrender.com';
const FLEET_URL='https://ineos-fleet-app.onrender.com';

/* ===== PRIORITY BADGES ===== */
const PRI={info:'bg-blue-100 text-blue-700',important:'bg-amber-100 text-amber-700',urgent:'bg-red-100 text-red-700'};
const GRADE_COLORS={A:'text-green-600 bg-green-50',B:'text-blue-600 bg-blue-50',C:'text-amber-600 bg-amber-50',D:'text-orange-600 bg-orange-50',F:'text-red-600 bg-red-50'};

/* ===== TOAST SYSTEM ===== */
let _toastFn=null;
function Toast(){const[msg,setMsg]=useState(null);_toastFn=(text,type='success')=>{setMsg({text,type});setTimeout(()=>setMsg(null),3000)};
  if(!msg)return null;
  const bg=msg.type==='error'?'bg-red-600':msg.type==='warning'?'bg-amber-600':'bg-green-600';
  return <div className={`fixed bottom-6 right-6 ${bg} text-white px-5 py-3 rounded-lg shadow-lg z-[9999] text-sm font-medium`} style={{animation:'ids-fadeInUp 0.3s ease'}}>{msg.text}</div>;
}
function toast(text,type){if(_toastFn)_toastFn(text,type)}

/* ===== SKELETON LOADING ===== */
function Skeleton({className}){return <div className={`ids-skeleton ${className||''}`} style={{minHeight:'20px'}}/>}
function SkeletonKPI(){return <div className="ids-skeleton" style={{height:'90px',borderRadius:'6px'}}/>}
function SkeletonTable(){return <div className="ids-skeleton" style={{height:'200px',borderRadius:'6px'}}/>}

/* ===== ERROR BOUNDARY ===== */
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={hasError:false,error:null}}
  static getDerivedStateFromError(e){return{hasError:true,error:e}}
  render(){if(this.state.hasError)return <div className="p-8 text-center"><div className="text-red-500 text-lg font-semibold mb-2">Something went wrong</div><p className="text-sm text-gray-500">{this.state.error?.message}</p><button onClick={()=>this.setState({hasError:false})} className="mt-4 px-4 py-2 bg-ineos-red text-white rounded text-sm">Try Again</button></div>;return this.props.children}
}

/* ===== SESSION TIMEOUT ===== */
function useSessionTimeout(mins=720){
  useEffect(()=>{
    const start=Date.now();
    const check=setInterval(()=>{if(Date.now()-start>mins*60*1000){toast('Session expired','warning');setTimeout(()=>API.logout(),2000)}},60000);
    return()=>clearInterval(check);
  },[]);
}

/* ===== COMMAND PALETTE ===== */
function CommandPalette({open,onClose,items,onSelect}){
  const[q,setQ]=useState('');
  const filtered=items.filter(i=>i.label.toLowerCase().includes(q.toLowerCase()));
  useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();onSelect?.('toggle')}if(e.key==='Escape')onClose()};document.addEventListener('keydown',h);return()=>document.removeEventListener('keydown',h)},[]);
  if(!open)return null;
  return <div className="ids-cmd-overlay" onClick={onClose}><div className="ids-cmd-box" onClick={e=>e.stopPropagation()}>
    <input className="ids-cmd-input" placeholder="Search pages, actions..." value={q} onChange={e=>setQ(e.target.value)} autoFocus/>
    <div className="ids-cmd-results">{filtered.map((item,i)=><div key={i} className="ids-cmd-item" onClick={()=>{onSelect(item.action);onClose();setQ('')}}><span>{item.label}</span><span className="ids-cmd-item-group">{item.group}</span></div>)}</div>
  </div></div>;
}

/* ===== MINI CHART COMPONENT ===== */
function MiniChart({type,data,labels,color,height}){
  const ref=React.useRef(null);const chartRef=React.useRef(null);
  useEffect(()=>{if(!ref.current||!data?.length)return;if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type:type||'line',data:{labels:labels||data.map((_,i)=>i),datasets:[{data,borderColor:color||'#FF4639',backgroundColor:(color||'#FF4639')+'20',fill:type==='line',borderWidth:2,pointRadius:0,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy()};
  },[data]);
  return <canvas ref={ref} style={{height:height||'60px',width:'100%'}}/>;
}

/* ===== LOGIN PAGE ===== */
function LoginPage({onLogin}){
  const[u,setU]=useState('');const[p,setP]=useState('');const[err,setErr]=useState('');
  const submit=async e=>{e.preventDefault();try{const r=await API.post('/api/auth/login',{username:u,password:p});API.setToken(r.token);sessionStorage.setItem('pu',JSON.stringify(r));onLogin(r)}catch{setErr('Invalid credentials')}};
  return <div className="min-h-screen bg-ineos-charcoal flex items-center justify-center">
    <div className="bg-white rounded-lg p-10 w-96 shadow-2xl">
      <div className="flex items-center gap-2 mb-1"><div className="w-1 h-8 bg-ineos-red rounded"></div><h1 className="text-2xl font-bold tracking-tight text-ineos-onyx">INEOS AMERICAS</h1></div>
      <p className="text-ineos-iron-smoke text-sm mb-8">Sign in to continue</p>
      <form onSubmit={submit}>
        <input className="w-full border border-ineos-dove rounded px-3 py-2.5 mb-3 text-sm" value={u} onChange={e=>setU(e.target.value)} placeholder="Username"/>
        <input className="w-full border border-ineos-dove rounded px-3 py-2.5 mb-4 text-sm" type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="Password"/>
        {err&&<p className="text-red-600 text-xs mb-3">{err}</p>}
        <button className="w-full bg-ineos-charcoal text-white rounded py-2.5 font-semibold text-sm hover:bg-ineos-onyx">Sign In</button>
      </form>
    </div>
  </div>;
}

/* ===== INTERNAL HUB ===== */
function InternalHub({user}){
  const[page,setPage]=useState('tools');const[bulletins,setBulletins]=useState([]);const[cmdOpen,setCmdOpen]=useState(false);
  useEffect(()=>{API.get('/api/bulletins').then(setBulletins).catch(()=>{})},[]);
  const isAdmin=user.role==='admin';
  const nav=[['tools','Tools'],['bulletins','Bulletins']];
  if(isAdmin)nav.push(['dealer-preview','Dealer Preview'],['admin-users','Users'],['admin-bulletins','Manage Bulletins'],['admin-links','Manage Links'],['admin-data','Data Upload']);

  return <div className="ids-layout" style={{minHeight:'100vh'}}>
    <aside className="ids-sidebar">
      <div className="ids-sidebar-header">
        <div className="ids-sidebar-logo">IN</div>
        <div><div className="ids-sidebar-brand">INEOS Americas</div><div className="ids-sidebar-sub">Internal Hub</div></div>
      </div>
      <button className="ids-cmd-trigger" onClick={()=>setCmdOpen(true)}><span>Search...</span><kbd>⌘K</kbd></button>
      <nav className="ids-nav">
        <div className="ids-nav-group"><div className="ids-nav-group-label">Hub</div>
          {[['tools','Tools'],['bulletins','Bulletins']].map(([k,l])=><button key={k} onClick={()=>setPage(k)} className={`ids-nav-item ${page===k?'active':''}`}>{l}</button>)}
        </div>
        {isAdmin&&<div className="ids-nav-group"><div className="ids-nav-group-label">Admin</div>
          {[['dealer-preview','Dealer Preview'],['admin-users','Users'],['admin-bulletins','Manage Bulletins'],['admin-links','Manage Links'],['admin-data','Data Upload']].map(([k,l])=><button key={k} onClick={()=>setPage(k)} className={`ids-nav-item ${page===k?'active':''}`}>{l}</button>)}
        </div>}
      </nav>
      <div className="ids-sidebar-footer"><button onClick={()=>API.logout()} style={{background:'none',border:'none',color:'inherit',cursor:'pointer',fontSize:'12px'}}>Sign Out</button></div>
    </aside>
    <main className="ids-main" style={{background:'var(--ids-surface-page)',padding:'24px 32px'}}>
      {page==='tools'&&<ToolsPage bulletins={bulletins}/>}
      {page==='bulletins'&&<BulletinsList bulletins={bulletins}/>}
      {page==='dealer-preview'&&<DealerPreview user={user}/>}
      {page==='admin-users'&&<AdminUsers/>}
      {page==='admin-bulletins'&&<AdminBulletins/>}
      {page==='admin-links'&&<AdminLinks/>}
      {page==='admin-data'&&<AdminDataUpload/>}
    </main>
  </div>;
}

function ToolsPage({bulletins}){
  const tools=[
    {name:'Americas Dashboard',desc:'Daily operations dashboard with KPIs and vehicle tracking.',url:DASH_URL,color:'bg-amber-50 text-amber-700'},
    {name:'Allocations',desc:'Vehicle allocation tracking across regions.',url:ALLOC_URL,color:'bg-blue-50 text-blue-700'},
    {name:'Incentive Dashboard',desc:'Incentive programs, budgets, and dealer pay files.',url:INCENT_URL,color:'bg-green-50 text-green-700'},
    {name:'Fleet Management',desc:'Fleet tracking, company car policies, and delivery.',url:FLEET_URL,color:'bg-purple-50 text-purple-700'},
  ];
  return <div className="space-y-8">
    <div><h2 className="text-2xl font-bold text-ineos-charcoal">Americas Hub</h2><p className="text-ineos-iron-smoke mt-1">Central access point for all INEOS Automotive Americas tools.</p></div>
    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
      {tools.map(t=><a key={t.name} href={t.url} target="_blank" rel="noopener noreferrer" className="group bg-white rounded-xl border border-ineos-dove p-5 hover:shadow-lg transition-all">
        <div className={`w-12 h-12 rounded-lg ${t.color} flex items-center justify-center mb-3 text-lg font-bold`}>{t.name[0]}</div>
        <h3 className="font-semibold text-ineos-onyx group-hover:text-ineos-red transition-colors">{t.name}</h3>
        <p className="text-xs text-ineos-iron-smoke mt-1">{t.desc}</p>
      </a>)}
    </div>
    {bulletins.length>0&&<div className="bg-white rounded-xl border border-ineos-dove p-5">
      <h3 className="text-sm font-semibold text-ineos-iron-smoke uppercase tracking-wider mb-3">Recent Bulletins</h3>
      {bulletins.slice(0,3).map(b=><div key={b.id} className="mb-3 last:mb-0"><div className="flex items-center gap-2"><span className={`text-[10px] px-2 py-0.5 rounded-full font-medium ${PRI[b.priority]}`}>{b.priority}</span><span className="text-sm font-medium">{b.title}</span><span className="text-xs text-ineos-silver-dust ml-auto">{b.created_at?.slice(0,10)}</span></div><p className="text-xs text-ineos-iron-smoke mt-1">{b.content}</p></div>)}
    </div>}
  </div>;
}

function BulletinsList({bulletins}){
  return <div><h2 className="text-xl font-bold mb-4">Bulletins</h2>
    <div className="space-y-3">{bulletins.map(b=><div key={b.id} className="bg-white rounded-xl border border-ineos-dove p-5">
      <div className="flex items-center gap-2 mb-2"><span className={`text-[10px] px-2 py-0.5 rounded-full font-medium ${PRI[b.priority]}`}>{b.priority}</span><h3 className="font-semibold">{b.title}</h3><span className="text-xs text-ineos-silver-dust ml-auto">{b.created_at?.slice(0,10)}</span></div>
      <p className="text-sm text-ineos-iron-smoke">{b.content}</p>
    </div>)}</div>
    {bulletins.length===0&&<p className="text-ineos-silver-dust text-sm">No bulletins yet.</p>}
  </div>;
}

/* ===== DEALER PREVIEW (Impersonate Mode) ===== */
function DealerPreview({user}){
  const[dealers,setDealers]=useState([]);const[selected,setSelected]=useState(null);
  useEffect(()=>{API.get('/api/admin/users').then(u=>setDealers(u.filter(x=>x.role==='dealer')))},[]);
  if(selected)return <div>
    <div className="bg-amber-50 border-b border-amber-200 px-6 py-2 flex items-center justify-between">
      <span className="text-sm text-amber-800 font-medium">Preview Mode — Viewing as: <strong>{selected.dealer_name||selected.username}</strong></span>
      <button onClick={()=>setSelected(null)} className="text-xs bg-amber-600 text-white px-3 py-1 rounded hover:bg-amber-700">Exit Preview</button>
    </div>
    <DealerHub user={{...user, role:'dealer', dealer_name:selected.dealer_name, username:selected.username}}/>
  </div>;
  return <div><h2 className="text-xl font-bold mb-2">Dealer Hub Preview</h2>
    <p className="text-sm text-ineos-iron-smoke mb-6">Select a dealer account to preview exactly what they see when they log in.</p>
    {dealers.length===0&&<div className="bg-white rounded-xl border border-ineos-dove p-8 text-center"><p className="text-ineos-silver-dust">No dealer accounts created yet.</p><p className="text-xs text-ineos-silver-dust mt-1">Go to <strong>Users</strong> to create dealer accounts first.</p></div>}
    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      {dealers.map(d=><button key={d.id} onClick={()=>setSelected(d)} className="bg-white rounded-xl border border-ineos-dove p-5 text-left hover:shadow-lg hover:border-ineos-mushroom transition-all group">
        <div className="flex items-center gap-3 mb-2"><div className="w-10 h-10 bg-green-50 text-green-700 rounded-lg flex items-center justify-center font-bold text-sm">{(d.dealer_name||d.username)[0]}</div><div><div className="font-semibold text-ineos-onyx group-hover:text-ineos-red transition-colors">{d.dealer_name||'—'}</div><div className="text-xs text-ineos-silver-dust">@{d.username}</div></div></div>
        <p className="text-xs text-ineos-iron-smoke">Click to preview this dealer's portal</p>
      </button>)}
    </div>
  </div>;
}

/* ===== ADMIN PAGES ===== */
function AdminUsers(){
  const[users,setUsers]=useState([]);const[f,setF]=useState({username:'',password:'',role:'dealer',dealer_name:''});
  const load=()=>API.get('/api/admin/users').then(setUsers);
  useEffect(()=>{load()},[]);
  const add=async e=>{e.preventDefault();await API.post('/api/admin/users',f);setF({username:'',password:'',role:'dealer',dealer_name:''});load()};
  const del=async id=>{if(confirm('Delete user?')){await API.del(`/api/admin/users/${id}`);load()}};
  return <div><h2 className="text-xl font-bold mb-4">User Management</h2>
    <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
      <h4 className="text-sm font-semibold text-blue-800 mb-1">Dealer Name Format Guide</h4>
      <p className="text-xs text-blue-700 leading-relaxed">The <strong>Dealer Name</strong> must match exactly how the dealer appears in the Americas Dashboard Master File data. This name is used to filter retail sales, test drives, VIN lookup, and all dealer-specific data. Examples:</p>
      <div className="flex flex-wrap gap-2 mt-2">
        <span className="text-[11px] bg-blue-100 text-blue-800 px-2 py-0.5 rounded font-mono">Grenadier Dallas</span>
        <span className="text-[11px] bg-blue-100 text-blue-800 px-2 py-0.5 rounded font-mono">Grenadier Manhattan</span>
        <span className="text-[11px] bg-blue-100 text-blue-800 px-2 py-0.5 rounded font-mono">Grenadier San Francisco</span>
        <span className="text-[11px] bg-blue-100 text-blue-800 px-2 py-0.5 rounded font-mono">Grenadier Bellevue</span>
      </div>
      <p className="text-[11px] text-blue-600 mt-2">Check the Dashboard's Dealer Performance tab for the exact spelling used in the data.</p>
    </div>
    <form onSubmit={add} className="bg-white rounded-xl border border-ineos-dove p-5 mb-6 grid grid-cols-5 gap-3 items-end">
      <div><label className="text-xs text-ineos-iron-smoke">Username</label><input className="w-full border border-ineos-dove rounded px-2 py-1.5 text-sm" value={f.username} onChange={e=>setF({...f,username:e.target.value})} placeholder="e.g. grenadier_dallas" required/></div>
      <div><label className="text-xs text-ineos-iron-smoke">Password</label><input className="w-full border border-ineos-dove rounded px-2 py-1.5 text-sm" value={f.password} onChange={e=>setF({...f,password:e.target.value})} required/></div>
      <div><label className="text-xs text-ineos-iron-smoke">Role</label><select className="w-full border border-ineos-dove rounded px-2 py-1.5 text-sm" value={f.role} onChange={e=>setF({...f,role:e.target.value})}><option value="dealer">Dealer</option><option value="internal">Internal</option><option value="admin">Admin</option></select></div>
      <div><label className="text-xs text-ineos-iron-smoke">Dealer Name <span className="text-ineos-red">*</span></label><input className="w-full border border-ineos-dove rounded px-2 py-1.5 text-sm" value={f.dealer_name} onChange={e=>setF({...f,dealer_name:e.target.value})} placeholder="Must match Master File exactly"/></div>
      <button className="bg-ineos-red text-white rounded px-4 py-1.5 text-sm font-medium">Add User</button>
    </form>
    <div className="bg-white rounded-xl border border-ineos-dove overflow-hidden"><table className="w-full text-sm"><thead><tr className="border-b border-ineos-dove bg-ineos-mushroom-light text-xs uppercase tracking-wider text-ineos-iron-smoke"><th className="text-left p-3">Username</th><th className="text-left p-3">Role</th><th className="text-left p-3">Dealer</th><th className="text-left p-3">Created</th><th className="p-3"></th></tr></thead><tbody>
      {users.map(u=><tr key={u.id} className="border-b border-ineos-dove/50 hover:bg-ineos-mushroom-light/50"><td className="p-3 font-medium">{u.username}</td><td className="p-3"><span className={`text-xs px-2 py-0.5 rounded-full ${u.role==='admin'?'bg-red-100 text-red-700':u.role==='internal'?'bg-blue-100 text-blue-700':'bg-green-100 text-green-700'}`}>{u.role}</span></td><td className="p-3 text-ineos-iron-smoke">{u.dealer_name||'—'}</td><td className="p-3 text-xs text-ineos-silver-dust">{u.created_at?.slice(0,10)}</td><td className="p-3">{u.role!=='admin'&&<button onClick={()=>del(u.id)} className="text-red-500 text-xs hover:underline">Delete</button>}</td></tr>)}
    </tbody></table></div>
  </div>;
}

function AdminBulletins(){
  const[items,setItems]=useState([]);const[f,setF]=useState({title:'',content:'',priority:'info',audience:'both'});
  const load=()=>API.get('/api/bulletins?audience=').then(r=>{if(Array.isArray(r))setItems(r)});
  useEffect(()=>{load()},[]);
  const add=async e=>{e.preventDefault();await API.post('/api/bulletins',f);setF({title:'',content:'',priority:'info',audience:'both'});load()};
  const del=async id=>{await API.del(`/api/bulletins/${id}`);load()};
  return <div><h2 className="text-xl font-bold mb-4">Manage Bulletins</h2>
    <form onSubmit={add} className="bg-white rounded-xl border border-ineos-dove p-5 mb-6 space-y-3">
      <div className="grid grid-cols-3 gap-3">
        <div><label className="text-xs text-ineos-iron-smoke">Title</label><input className="w-full border border-ineos-dove rounded px-2 py-1.5 text-sm" value={f.title} onChange={e=>setF({...f,title:e.target.value})} required/></div>
        <div><label className="text-xs text-ineos-iron-smoke">Priority</label><select className="w-full border border-ineos-dove rounded px-2 py-1.5 text-sm" value={f.priority} onChange={e=>setF({...f,priority:e.target.value})}><option value="info">Info</option><option value="important">Important</option><option value="urgent">Urgent</option></select></div>
        <div><label className="text-xs text-ineos-iron-smoke">Audience</label><select className="w-full border border-ineos-dove rounded px-2 py-1.5 text-sm" value={f.audience} onChange={e=>setF({...f,audience:e.target.value})}><option value="both">Both</option><option value="internal">Internal Only</option><option value="dealer">Dealer Only</option></select></div>
      </div>
      <div><label className="text-xs text-ineos-iron-smoke">Content</label><textarea className="w-full border border-ineos-dove rounded px-2 py-1.5 text-sm h-20" value={f.content} onChange={e=>setF({...f,content:e.target.value})} required/></div>
      <button className="bg-ineos-red text-white rounded px-4 py-2 text-sm font-medium">Post Bulletin</button>
    </form>
    <div className="space-y-2">{items.map(b=><div key={b.id} className="bg-white rounded-lg border border-ineos-dove p-4 flex items-start justify-between">
      <div><div className="flex items-center gap-2 mb-1"><span className={`text-[10px] px-2 py-0.5 rounded-full font-medium ${PRI[b.priority]}`}>{b.priority}</span><span className="text-xs text-ineos-silver-dust">{b.audience}</span></div><h4 className="font-medium text-sm">{b.title}</h4><p className="text-xs text-ineos-iron-smoke">{b.content}</p></div>
      <button onClick={()=>del(b.id)} className="text-red-500 text-xs hover:underline shrink-0 ml-4">Delete</button>
    </div>)}</div>
  </div>;
}

function AdminLinks(){
  const[cats,setCats]=useState([]);const[newCat,setNewCat]=useState('');const[newLink,setNewLink]=useState({});
  const load=()=>API.get('/api/links').then(setCats);
  useEffect(()=>{load()},[]);
  const addCat=async()=>{if(!newCat)return;await API.post('/api/links/categories',{name:newCat});setNewCat('');load()};
  const delCat=async id=>{if(confirm('Delete category and all its links?')){await API.del(`/api/links/categories/${id}`);load()}};

  const delLink=async id=>{await API.del(`/api/links/items/${id}`);load()};

      </div>
    </div>)}</div>

function AdminDataUpload(){
  const[sources,setSources]=useState({});const[uploading,setUploading]=useState({});const[results,setResults]=useState({});
  const[ga4Loading,setGa4Loading]=useState(false);const[ga4Status,setGa4Status]=useState(null);
  useEffect(()=>{API.get('/api/admin/data-sources').then(setSources).catch(()=>{})},[]);

  const CARDS=[
    {id:'sap_export',label:'SAP Vehicle Export',desc:'Daily vehicle data export from SAP (~21K rows, 50 cols). Primary vehicle data source.',cadence:'Daily',accept:'.xlsx',color:'#FF4639'},
    {id:'sap_handover',label:'SAP Handover Report',desc:'Handover dates, revenue recognition, retail dates. Indexed by VIN.',cadence:'Daily',accept:'.xlsx',color:'#C75B39'},
    {id:'stock_pipeline',label:'Stock & Pipeline Report',desc:'Vessel ETAs, shipping data, pipeline positions. Replaces VESSEL ETA sheet.',cadence:'Daily',accept:'.xlsx,.xlsb',color:'#F9A825'},
    {id:'c4c_leads',label:'C4C Leads (Marketing)',desc:'Lead data from C4C — brand leads, test drives, retailer status.',cadence:'Daily',accept:'.xlsx',color:'#7B5EA7'},
    {id:'santander',label:'Santander Daily Report',desc:'Finance & lease application volume, approvals, fundings.',cadence:'Daily',accept:'.xlsx',color:'#00897B'},
    {id:'sales_order',label:'Sales Order Report',desc:'Bill-to-Dealer data for true retail attribution. Cross-references with Handover.',cadence:'Daily',accept:'.xlsx',color:'#43A047'},
    {id:'qm_leads',label:'QM Leads (ALL LEADS)',desc:'Quartermaster lead list — cross-referenced with C4C to split SW vs QM volume.',cadence:'Daily',accept:'.xlsx',color:'#E91E63'},
    {id:'incentive_spend',label:'Incentive & Subvention Spend',desc:'Variable spend by VIN — incentive and subvention amounts for MSRP-less-VIE calculation.',cadence:'Monthly',accept:'.xlsx',color:'#FF6F00'},
    {id:'campaign_codes',label:'Campaign Code Extract',desc:'Campaign codes by VIN — determines CVP, Demo flags. Critical for dashboard counting and Incentive Dashboard.',cadence:'Monthly',accept:'.xlsx',color:'#AD1457'},
    {id:'urban_science',label:'Urban Science Extract',desc:'Customer geography data — city, state, ZIP for distance analysis.',cadence:'Monthly',accept:'.xlsx',color:'#5C6BC0'},
  ];

  const uploadFile=async(sourceId,file)=>{
    setUploading(u=>({...u,[sourceId]:true}));setResults(r=>({...r,[sourceId]:null}));
    try{
      const res=await API.uploadFile(`/api/admin/upload-source/${sourceId}`,file);
      setResults(r=>({...r,[sourceId]:res}));
      API.get('/api/admin/data-sources').then(setSources);
    }catch(e){setResults(r=>({...r,[sourceId]:{error:e.message}}))}
    finally{setUploading(u=>({...u,[sourceId]:false}))}
  };

  const pullGA4=async()=>{setGa4Loading(true);setGa4Status(null);try{const r=await API.post('/api/admin/pull-ga4?days=90',{});setGa4Status(r)}catch(e){setGa4Status({error:e.message})}finally{setGa4Loading(false);API.get('/api/admin/data-sources').then(setSources)}};

  const rebuildAll=async()=>{toast('Rebuilding all dashboards...','info');try{const r=await API.post('/api/admin/rebuild-all',{});if(r.status==='success')toast('All dashboards rebuilt!','success');else toast('Error: '+(r.error||'Unknown'),'error')}catch(e){toast('Rebuild failed','error')}};

  const freshColor=(s)=>s==='green'?'#2E7D32':s==='yellow'?'#F9A825':s==='red'?'#C4281D':'#9F9F9F';
  const freshBg=(s)=>s==='green'?'#E8F5E9':s==='yellow'?'#FFF8E1':s==='red'?'#FFEBE9':'#F5F5F5';

  return <div>
    <div className="flex items-center justify-between mb-4">
      <div><h2 className="text-xl font-bold">Data Sources</h2><p className="text-xs text-ineos-iron-smoke mt-1">Upload raw source files to refresh all dashboards. No more Master File needed.</p></div>
      <button onClick={rebuildAll} className="bg-ineos-charcoal text-white rounded px-5 py-2 text-sm font-medium hover:opacity-90">Rebuild All Dashboards</button>
    </div>

    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      {CARDS.map(card=>{
        const s=sources[card.id]||{};
        const fresh=s.freshness||'gray';
        const r=results[card.id];
        return <div key={card.id} className="rounded-xl p-5 transition-all hover:shadow-md" style={{background:freshBg(fresh),borderLeft:`4px solid ${freshColor(fresh)}`}}>
          <div className="flex items-center justify-between mb-2">
            <span className="font-semibold text-sm" style={{fontFamily:'var(--ids-font-heading)'}}>{card.label}</span>
            <span className="text-[10px] font-semibold uppercase tracking-wider px-2 py-0.5 rounded-full" style={{background:'rgba(255,255,255,0.7)',color:'var(--ids-text-tertiary)'}}>{card.cadence}</span>
          </div>
          <p className="text-[11px] text-ineos-iron-smoke mb-2">{card.desc}</p>
          {s.last_upload&&<p className="text-[11px] mb-1" style={{color:freshColor(fresh)}}>Updated: {new Date(s.last_upload).toLocaleString()} &middot; {s.row_count?.toLocaleString()||0} rows</p>}
          {!s.last_upload&&<p className="text-[11px] text-ineos-silver-dust mb-1">Never uploaded</p>}
          <div className="mt-2">
            <input type="file" id={`file-${card.id}`} accept={card.accept} style={{display:'none'}} onChange={e=>{if(e.target.files[0])uploadFile(card.id,e.target.files[0]);e.target.value=''}}/>
            <label htmlFor={`file-${card.id}`} className="inline-flex items-center gap-1 px-3 py-1.5 rounded text-xs font-medium cursor-pointer transition-all hover:opacity-80" style={{background:card.color,color:'#fff'}}>{uploading[card.id]?'Uploading...':'Upload '+card.accept}</label>
          </div>
          {r&&r.status==='success'&&<p className="text-[11px] text-green-700 mt-2">{r.rows?.toLocaleString()} rows loaded</p>}
          {r&&r.error&&<p className="text-[11px] text-red-600 mt-2">{r.error}</p>}
        </div>
      })}

      <div className="rounded-xl p-5 transition-all hover:shadow-md" style={{background:freshBg(sources.ga4?.freshness||'gray'),borderLeft:`4px solid #3478B2`}}>
        <div className="flex items-center justify-between mb-2">
          <span className="font-semibold text-sm" style={{fontFamily:'var(--ids-font-heading)'}}>Google Analytics (GA4)</span>
          <span className="text-[10px] font-semibold uppercase tracking-wider px-2 py-0.5 rounded-full" style={{background:'rgba(255,255,255,0.7)',color:'var(--ids-text-tertiary)'}}>API</span>
        </div>
        <p className="text-[11px] text-ineos-iron-smoke mb-2">Pull all 6 GA4 reports automatically via Google Analytics API. 90-day lookback.</p>
        {sources.ga4?.last_upload&&<p className="text-[11px] text-blue-700 mb-1">Last pull: {new Date(sources.ga4.last_upload).toLocaleString()} &middot; {sources.ga4.row_count?.toLocaleString()||0} rows</p>}
        {!sources.ga4?.last_upload&&<p className="text-[11px] text-ineos-silver-dust mb-1">Never pulled</p>}
        <button onClick={pullGA4} disabled={ga4Loading} className="mt-2 px-3 py-1.5 rounded text-xs font-medium text-white disabled:opacity-50" style={{background:'#3478B2'}}>{ga4Loading?'Pulling...':'Pull GA4 Data'}</button>
        {ga4Status?.status==='success'&&<div className="mt-2 text-[11px] text-blue-700">{Object.entries(ga4Status.reports||{}).map(([k,v])=><span key={k} className="mr-2">{k}: {v.rows}</span>)}</div>}
        {ga4Status?.error&&<p className="text-[11px] text-red-600 mt-2">{ga4Status.error}</p>}
      </div>
    </div>
  </div>;
}

/* ===== NATIVE RETAIL SALES PAGE ===== */
function DealerRetailSales(){
  const[data,setData]=useState([]);
  useEffect(()=>{API.get('/api/data/retail-sales').then(setData).catch(()=>{})},[]);
  // Group by dealer with SW/QM/SVO counts, sorted highest to lowest
  const byDealer={};
  data.forEach(r=>{
    if(!byDealer[r.dealer])byDealer[r.dealer]={dealer:r.dealer,market:r.market,sw:0,qm:0,svo:0,total:0};
    byDealer[r.dealer][r.body==='SW'?'sw':r.body==='QM'?'qm':'svo']++;
    byDealer[r.dealer].total++;
  });
  const sorted=Object.values(byDealer).sort((a,b)=>b.total-a.total);
  const grandTotal=sorted.reduce((s,d)=>s+d.total,0);
  return <div className="p-6 space-y-6">
    <h2 className="text-xl font-bold">Retail Sales — Month to Date</h2>
    <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
      <KPI label="Total Units (Market)" value={grandTotal} color="text-green-600"/>
      <KPI label="SW / QM / SVO" value={`${sorted.reduce((s,d)=>s+d.sw,0)} / ${sorted.reduce((s,d)=>s+d.qm,0)} / ${sorted.reduce((s,d)=>s+d.svo,0)}`}/>
      <KPI label="Dealers Reporting" value={sorted.length}/>
    </div>
    <div className="bg-white rounded-xl border border-ineos-dove overflow-hidden">
      <table className="w-full text-sm"><thead><tr className="border-b border-ineos-dove bg-ineos-mushroom-light text-xs uppercase text-ineos-iron-smoke tracking-wider">
        <th className="text-left p-3">Dealer</th><th className="text-left p-3">Market</th><th className="text-right p-3">SW</th><th className="text-right p-3">QM</th><th className="text-right p-3">SVO</th><th className="text-right p-3 font-bold">Total</th>
      </tr></thead><tbody>
        {sorted.map(d=><tr key={d.dealer} className="border-b border-ineos-dove/30 hover:bg-ineos-mushroom-light/50"><td className="p-3 font-medium">{d.dealer}</td><td className="p-3 text-ineos-iron-smoke">{d.market}</td><td className="text-right p-3">{d.sw}</td><td className="text-right p-3">{d.qm}</td><td className="text-right p-3">{d.svo}</td><td className="text-right p-3 font-bold">{d.total}</td></tr>)}
      </tbody></table>
    </div>
    {data.length===0&&<p className="text-ineos-silver-dust text-sm text-center py-8">No retail sales data yet. Upload the Master File to populate.</p>}

}

        <th className="text-left p-2">VIN</th><th className="text-left p-2">Body</th><th className="text-left p-2">MY</th><th className="text-left p-2">Trim</th><th className="text-left p-2">Ext Color</th><th className="text-left p-2">Channel</th><th className="text-right p-2">MSRP</th><th className="text-right p-2">Days to Sell</th><th className="text-left p-2">Date</th>
      </tr></thead><tbody>{soldUnits.map(r=><tr key={r.id} className="border-b border-ineos-dove/30 hover:bg-ineos-mushroom-light/50">
        <td className="p-2 font-mono font-medium">{r.vin_full||r.vin}</td><td className="p-2">{r.body}</td><td className="p-2">{r.model_year}</td><td className="p-2">{r.trim}</td><td className="p-2">{r.ext_color}</td><td className="p-2">{r.channel}</td><td className="text-right p-2">${r.msrp?.toLocaleString()}</td><td className="text-right p-2">{r.days_to_sell}</td><td className="p-2">{r.handover_date}</td>
      </tr>)}</tbody></table></div>}
      {soldUnits.length===0&&<p className="text-ineos-silver-dust text-sm text-center py-4 mt-4">No MTD sold units yet.</p>}
    </div>}
    {(mode==='single'||mode==='mass')&&<div className="bg-white rounded-xl border border-ineos-dove p-5">
      {mode==='single'?<div className="flex gap-3"><input className="flex-1 border border-ineos-dove rounded px-3 py-2 text-sm" placeholder="Enter VIN or Sales Order #..." value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&search()}/><button onClick={search} disabled={loading} className="bg-ineos-red text-white rounded px-6 py-2 text-sm font-medium disabled:opacity-50">{loading?'Searching...':'Search'}</button></div>
      :<div><textarea className="w-full border border-ineos-dove rounded px-3 py-2 text-sm h-32 font-mono" placeholder="Paste multiple VINs or SO#s (one per line, comma or space separated)..." value={query} onChange={e=>setQuery(e.target.value)}/><button onClick={search} disabled={loading} className="bg-ineos-red text-white rounded px-6 py-2 text-sm font-medium mt-2 disabled:opacity-50">{loading?'Searching...':'Search All'}</button></div>}
    </div>}
    {mode==='search'&&stats&&<div className="grid grid-cols-2 lg:grid-cols-5 gap-4">
      <KPI label="Queries" value={stats.queries}/><KPI label="Found" value={stats.found} color="text-green-600"/><KPI label="Not Found" value={stats.not_found} color="text-red-500"/><KPI label="Dealer Stock" value={stats.dealer_stock} color="text-green-600"/><KPI label="Total MSRP" value={'$'+(stats.total_msrp||0).toLocaleString()}/>
    </div>}
    {mode==='search'&&results.length>0&&<div className="bg-white rounded-xl border border-ineos-dove overflow-hidden"><table className="w-full text-xs"><thead><tr className="border-b border-ineos-dove bg-ineos-mushroom-light text-[10px] uppercase tracking-wider text-ineos-iron-smoke">
      <th className="text-left p-2">VIN</th><th className="text-left p-2">Status</th><th className="text-left p-2">Body</th><th className="text-left p-2">MY</th><th className="text-left p-2">Trim</th><th className="text-left p-2">Ext Color</th><th className="text-right p-2">MSRP</th><th className="text-left p-2">Channel</th><th className="text-right p-2">DOL</th>
    </tr></thead><tbody>{results.map(v=><tr key={v.vin} className="border-b border-ineos-dove/30 hover:bg-ineos-mushroom-light/50">
      <td className="p-2 font-mono font-medium">{v.vin}</td><td className="p-2"><span className={`font-medium ${STAT_COLORS[v.status]||'text-ineos-iron-smoke'}`}>{v.status}</span></td><td className="p-2">{v.body}</td><td className="p-2">{v.model_year}</td><td className="p-2">{v.trim}</td><td className="p-2">{v.ext_color}</td><td className="text-right p-2">${v.msrp?.toLocaleString()}</td><td className="p-2">{v.channel}</td><td className="text-right p-2">{v.days_on_lot}</td>
    </tr>)}</tbody></table></div>}
  </div>;
}

/* ===== DEALER INVENTORY PAGE ===== */
function DealerInventory(){
  const[inv,setInv]=useState(null);const[tab,setTab]=useState('ground');
  useEffect(()=>{API.get('/api/data/inventory').then(setInv).catch(()=>{})},[]);
  if(!inv)return <div className="p-6 text-ineos-silver-dust">Loading inventory...</div>;
  const STAT_COLORS={"Dealer Stock":'text-green-600',"In-Transit to Dealer":'text-amber-600',"At Americas Port":'text-purple-600',"On Water":'text-cyan-600'};
  return <div className="p-6 space-y-6">
    <h2 className="text-xl font-bold">Dealer Inventory</h2>
    <div className="grid grid-cols-2 lg:grid-cols-6 gap-4">
      <KPI label="On Ground" value={inv.on_ground_total} color="text-green-600"/>
      <KPI label="SW / QM / SVO" value={`${inv.on_ground_sw} / ${inv.on_ground_qm} / ${inv.on_ground_svo}`}/>
      <KPI label="In Transit" value={inv.in_transit_total} color="text-amber-600"/>
      <KPI label="Avg Days on Lot" value={inv.avg_days_on_lot}/>
      <KPI label="Turn Rate" value={`${inv.turn_rate}%`} color={inv.turn_rate>50?'text-green-600':'text-amber-600'}/>
      <KPI label="Days Supply" value={inv.days_supply}/>
    </div>
    {Object.keys(inv.on_ground_by_my).length>0&&<div className="bg-white rounded-xl border border-ineos-dove p-5">
      <h3 className="text-sm font-semibold text-ineos-iron-smoke uppercase tracking-wider mb-3">On Ground by Model Year</h3>
      <div className="flex gap-4">{Object.entries(inv.on_ground_by_my).sort().map(([my,ct])=><div key={my} className="text-center"><div className="text-2xl font-bold text-ineos-onyx">{ct}</div><div className="text-xs text-ineos-iron-smoke">{my}</div></div>)}</div>
    </div>}
    <div className="flex gap-2"><button onClick={()=>setTab('ground')} className={`text-xs px-3 py-1 rounded ${tab==='ground'?'bg-ineos-charcoal text-white':'bg-ineos-mushroom text-ineos-onyx'}`}>On Ground ({inv.on_ground_total})</button><button onClick={()=>setTab('transit')} className={`text-xs px-3 py-1 rounded ${tab==='transit'?'bg-ineos-charcoal text-white':'bg-ineos-mushroom text-ineos-onyx'}`}>In Transit ({inv.in_transit_total})</button></div>
    <div className="bg-white rounded-xl border border-ineos-dove overflow-hidden"><table className="w-full text-xs"><thead><tr className="border-b border-ineos-dove bg-ineos-mushroom-light text-[10px] uppercase tracking-wider text-ineos-iron-smoke">
      <th className="text-left p-2">VIN</th><th className="text-left p-2">Status</th><th className="text-left p-2">Body</th><th className="text-left p-2">MY</th><th className="text-left p-2">Trim</th><th className="text-left p-2">Ext Color</th><th className="text-right p-2">MSRP</th><th className="text-right p-2">{tab==='ground'?'Days on Lot':'ETA'}</th><th className="text-left p-2">Channel</th>
    </tr></thead><tbody>{(tab==='ground'?inv.on_ground_vehicles:inv.in_transit_vehicles).map(v=><tr key={v.vin} className="border-b border-ineos-dove/30 hover:bg-ineos-mushroom-light/50">
      <td className="p-2 font-mono font-medium">{v.vin}</td><td className="p-2"><span className={`font-medium ${STAT_COLORS[v.status]||''}`}>{v.status}</span></td><td className="p-2">{v.body}</td><td className="p-2">{v.model_year}</td><td className="p-2">{v.trim}</td><td className="p-2">{v.ext_color}</td><td className="text-right p-2">${v.msrp?.toLocaleString()}</td><td className="text-right p-2">{tab==='ground'?v.days_on_lot:v.eta}</td><td className="p-2">{v.channel}</td>
    </tr>)}</tbody></table></div>
    {inv.on_ground_total===0&&inv.in_transit_total===0&&<p className="text-ineos-silver-dust text-sm text-center py-4">No inventory data. Upload the Master File to populate.</p>}
  </div>;
}

/* ===== DEALER QUICK LINKS ===== */
function DealerQuickLinks({links}){
  return <div className="p-6 space-y-6"><h2 className="text-xl font-bold">Quick Links</h2>
    {links.length===0&&<p className="text-ineos-silver-dust text-sm">No links configured yet. Ask your admin to add links.</p>}
    {links.map(c=><div key={c.id} className="bg-white rounded-xl border border-ineos-dove p-5">
      <h3 className="font-semibold text-ineos-iron-smoke uppercase text-xs tracking-wider mb-3">{c.name}</h3>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        {c.links.map(l=><a key={l.id} href={l.url} target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 p-3 rounded-lg border border-ineos-dove hover:border-ineos-mushroom hover:shadow transition-all">
          <div><div className="text-sm font-medium text-ineos-onyx">{l.name}</div>{l.description&&<div className="text-xs text-ineos-silver-dust">{l.description}</div>}</div>
          <svg className="w-4 h-4 text-ineos-silver-dust ml-auto shrink-0" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
        </a>)}
      </div>
    </div>)}
  </div>;
}

/* ===== APP ROOT ===== */
function App(){
  const stored=sessionStorage.getItem('pu');
  const[user,setUser]=useState(stored?JSON.parse(stored):null);
  useSessionTimeout(720); // 12 hours
  if(!user||!API.token)return <><LoginPage onLogin={setUser}/><Toast/></>;
  const content=user.role==='dealer'?<DealerHub user={user}/>:<InternalHub user={user}/>;
  return <ErrorBoundary>{content}<Toast/></ErrorBoundary>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
